components:
  schemas:
    Action:
      properties:
        action:
          type: string
        data: {}
        href:
          type: string
        id:
          type: string
        input: {}
        links:
          type: object
        log:
          items:
            $ref: '#/components/schemas/LogRecord'
          type: array
        output: {}
        progress:
          type: integer
        status:
          enum:
          - pending
          - running
          - completed
          - cancelled
          - error
          type: string
        timeCompleted:
          format: date-time
          type: string
        timeRequested:
          format: date-time
          type: string
      type: object
    AutoExposureFromRawViewInput:
      properties:
        max_iterations:
          default: 20
          description: The number of adjustments to the camera's settings to make
            before giving up.
          type: integer
        percentile:
          default: 99.9
          description: A float between 0 and 100 setting the centile to use to measure
            the white point of the image.  A value of 99.9 allows 0.1% of the pixels
            to be erroneously bright - this helps stability in low light.
          example: 99.9
          type: number
        target_white_level:
          default: 700
          description: The pixel value (10-bit format) that we aim for when adjusting
            shutter/gain.
          example: 700
          type: integer
        tolerance:
          default: 0.05
          description: We stop adjusting when we get within this fraction of the target
            value.  It is a number between 0 and 1, usually 0.01--0.1.
          example: 0.05
          type: number
      type: object
    AutoWhiteBalanceFromRawViewInput:
      properties:
        percentile:
          default: 99.9
          description: A float between 0 and 100 setting the centile to use to measure
            the white point of the image.  A value of 99.9 allows 0.1% of the pixels
            to be erroneously bright - this helps stability in low light.
          example: 99.9
          type: number
      type: object
    BasicCaptureArgs:
      properties:
        bayer:
          default: false
          description: Include raw bayer data in capture
          type: boolean
        resize:
          $ref: '#/components/schemas/CaptureResize'
        use_video_port:
          default: false
          type: boolean
      type: object
    BasicDataset:
      properties:
        id:
          format: uuid
          type: string
        name:
          type: string
        type:
          type: string
      type: object
    Calibrate1DViewInput:
      properties:
        direction:
          example:
          - 1
          - 0
          - 0
          items:
            type: number
          type: array
      required:
      - direction
      type: object
    Capture:
      properties:
        annotations:
          additionalProperties:
            type: string
          type: object
        dataset:
          $ref: '#/components/schemas/BasicDataset'
        format:
          type: string
        id:
          format: uuid
          type: string
        links:
          type: object
        name:
          type: string
        path:
          description: Path of file on microscope device
          type: string
        tags:
          items:
            type: string
          type: array
        time:
          format: date
          type: string
      type: object
    CaptureResize:
      properties:
        height:
          example: 480
          type: integer
        width:
          example: 640
          type: integer
      required:
      - height
      - width
      type: object
    ClosedLoopMoveInImageCoordinatesViewInput:
      properties:
        x:
          description: The number of pixels to move in X
          example: 100
          type: number
        y:
          description: The number of pixels to move in Y
          example: 100
          type: number
      required:
      - x
      - y
      type: object
    Extension:
      properties:
        description:
          type: string
        links:
          type: object
        meta:
          type: object
        pythonName:
          type: string
        pythonObject:
          type: string
        title:
          type: string
      type: object
    FullCaptureArgs:
      properties:
        annotations:
          default: {}
          example: &id001
            Client: SwaggerUI
          type: object
        bayer:
          default: false
          description: Include raw bayer data in capture
          type: boolean
        filename:
          example: MyFileName
          type: string
        resize:
          $ref: '#/components/schemas/CaptureResize'
        tags:
          default: []
          example: &id002
          - docs
          items:
            type: string
          type: array
        temporary:
          default: false
          description: Delete capture on shutdown
          type: boolean
        use_video_port:
          default: false
          type: boolean
      type: object
    GPUPreviewStartAPIInput:
      properties:
        window:
          default: []
          example:
          - 0
          - 0
          - 640
          - 480
          items:
            type: integer
          type: array
      type: object
    GetRawChannelPercentilesViewInput:
      properties:
        percentile:
          description: A float between 0 and 100 setting the centile to calculate
          example: 99.9
          type: number
      type: object
    LogRecord:
      properties:
        created:
          format: date-time
          type: string
        filename:
          type: string
        levelname:
          type: string
        levelno:
          type: integer
        lineno:
          type: integer
        message:
          type: string
        name:
          type: string
      type: object
    MoveInImageCoordinatesViewInput:
      properties:
        x:
          description: The number of pixels to move in X
          example: 100
          type: number
        y:
          description: The number of pixels to move in Y
          example: 100
          type: number
      required:
      - x
      - y
      type: object
    MoveStageAPIInput:
      properties:
        absolute:
          default: false
          description: Move to an absolute position
          example: false
          type: boolean
        x:
          default: null
          example: 100
          nullable: true
          type: integer
        y:
          default: null
          example: 100
          nullable: true
          type: integer
        z:
          default: null
          example: 20
          nullable: true
          type: integer
      type: object
    TestClosedLoopSpiralScanViewInput:
      properties:
        N:
          description: The number of rings in the spiral scan
          example: 100
          type: integer
        x_step:
          description: The number of pixels to move in X
          example: 100
          type: number
        y_step:
          description: The number of pixels to move in Y
          example: 100
          type: number
      required:
      - N
      - x_step
      - y_step
      type: object
    TileScanArgs:
      properties:
        annotations:
          default: {}
          example: *id001
          type: object
        autofocus_dz:
          default: 50
          type: integer
        bayer:
          default: false
          description: Include raw bayer data in capture
          type: boolean
        detect_empty_fields_and_skip_autofocus:
          default: false
          type: boolean
        fast_autofocus:
          default: false
          type: boolean
        filename:
          example: MyFileName
          type: string
        grid:
          default:
          - 3
          - 3
          - 3
          example:
          - 3
          - 3
          - 3
          items:
            minimum: 1
            type: integer
          type: array
        namemode:
          default: coordinates
          example: coordinates
          type: string
        resize:
          $ref: '#/components/schemas/CaptureResize'
        stride_size:
          default:
          - 2000
          - 1500
          - 100
          example:
          - 2000
          - 1500
          - 100
          items:
            type: integer
          type: array
        style:
          default: raster
          type: string
        tags:
          default: []
          example: *id002
          items:
            type: string
          type: array
        temporary:
          default: false
          description: Delete capture on shutdown
          type: boolean
        use_video_port:
          default: false
          type: boolean
      type: object
    ZipObject:
      properties:
        data_size:
          type: number
        id:
          type: string
        links:
          type: object
        zip_size:
          type: number
      type: object
    autofocusInput:
      properties:
        dz:
          description: An ascending list of relative z positions
          example:
          - -300
          - -200
          - -100
          - 0
          - 100
          - 200
          - 300
          items:
            type: integer
          type: array
      type: object
    fast_autofocusInput:
      properties:
        dz:
          default: 2000
          description: Total Z range to search over (in stage steps)
          example: 2000
          type: integer
      type: object
    fast_up_down_up_autofocusInput:
      properties:
        backlash:
          default: 25
          description: Distance to undershoot, before correction move.
          minimum: 0
          type: integer
        dz:
          default: 2000
          description: Total Z range to search over (in stage steps)
          example: 2000
          type: integer
        initial_move_up:
          default: true
          description: Set to False to disable the initial move upwards
          type: boolean
        target_z:
          default: 0
          description: Target finishing position, relative to the focus.
          example: -100
          type: integer
      type: object
    measure_settling_timeInput:
      properties:
        delay:
          default: 5
          description: How long to measure sharpness for after the move, in seconds
          example: 5
          type: integer
        dz:
          default: 500
          description: Total Z range to move down, then up (in stage steps)
          example: 500
          type: integer
      type: object
    move_and_measureInput:
      properties:
        dz:
          description: The relative Z move to make
          type: integer
      required:
      - dz
      type: object
info:
  title: OpenFlexure Microscope openflexure:microscope:4828ac68-f2ed-4f3f-bcf9-bcde90c34728
  version: 2.11.0
openapi: 3.0.2
paths:
  /api/v2/:
    get:
      description: "A W3C compliant Thing Description is a JSON representation\nof\
        \ the API, including links to different endpoints.\nYou can browse it directly\
        \ (e.g. in Firefox), though for \ninteractive API documentation you should\
        \ try the swagger-ui \ndocs, at `docs/swagger-ui/`"
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json: {}
          description: W3C Thing Description
      summary: Thing Description
      tags: []
  /api/v2/extensions:
    get:
      description: 'List enabled extensions.


        Returns a list of Extension representations, including basic documentation.

        Describes server methods, web views, and other relevant Lab Things metadata.'
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Extension'
          description: A list of available extensions and their properties
      summary: List enabled extensions.
      tags:
      - extensions
  /api/v2/actions:
    get:
      description: 'Action queue


        This endpoint returns a list of all actions that have run since

        the server was started, including ones that have completed and

        actions that are still running.  Each entry includes links to

        manage and inspect that action.'
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                items:
                  $ref: '#/components/schemas/Action'
                type: array
          description: List of Action objects
      summary: Action queue
      tags: []
  /api/v2/actions/{task_id}:
    delete:
      description: 'Cancel a running Action


        A `DELETE` request will stop a running action.'
      parameters:
      - description: The unique ID of the action
        example: eeae7ae9-0c0d-45a4-9ef2-7b84bb67a1d1
        in: path
        name: task_id
        required: true
        schema:
          type: string
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
          description: Action object that was cancelled
        '404':
          description: Action not found
      summary: Cancel a running Action
      tags: []
    get:
      description: 'Show the status of an Action


        A `GET` request will return the current status

        of an action, including logs.  For completed

        actions, it will include the return value.'
      parameters:
      - description: The unique ID of the action
        example: eeae7ae9-0c0d-45a4-9ef2-7b84bb67a1d1
        in: path
        name: task_id
        required: true
        schema:
          type: string
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Action'
          description: Action object
        '404':
          description: Action not found
      summary: Show the status of an Action
      tags: []
  /api/v2/events/logging:
    get:
      description: Default method for GET requests. Returns the action queue (including
        already finished actions) for this action
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                properties:
                  data:
                    properties:
                      created:
                        format: date-time
                        type: string
                      filename:
                        type: string
                      levelname:
                        type: string
                      levelno:
                        format: integer
                        type: number
                      lineno:
                        format: integer
                        type: number
                      message:
                        type: string
                      name:
                        type: string
                    type: object
                  event:
                    type: string
                  timestamp:
                    format: date-time
                    type: string
                type: object
          description: Event queue
      summary: Default method for GET requests. Returns the action queue (including
        already finished actions) for this action
      tags:
      - events
  /api/v2/extensions/org.openflexure.autofocus/static/{path}:
    get:
      description: Files and folders within this path will be served from a static
        directory.
      parameters:
      - description: Path to the static file
        example: style.css
        in: path
        name: path
        required: true
        schema:
          type: string
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          description: Static file
        '404':
          description: Static file not found
      summary: Serve static files
      tags: []
  /api/v2/extensions/org.openflexure.autofocus/measure_sharpness:
    post:
      description: 'Measure the sharpness from the MJPEG stream


        Take a JPEG snapshot from the camera (extracted from the live preview stream)

        and return its size.  This is the sharpness metric used by the fast autofocus

        method.'
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
      summary: Measure the sharpness from the MJPEG stream
      tags: []
  /api/v2/extensions/org.openflexure.autofocus/autofocus:
    post:
      description: "Perform a simple autofocus routine.\n\nThe stage is moved to z\
        \ positions (relative to current position) in dz,\nand at each position an\
        \ image is captured and the sharpness function \nevaulated.  We then move\
        \ back to the position where the sharpness was\nhighest.  No interpolation\
        \ is performed.\n\ndz is assumed to be in ascending order (starting at -ve\
        \ values)\n\nThis `POST` request starts an Action, i.e. the hardware will\
        \ do something\nthat may continue after the HTTP request has been responded\
        \ to.  The \nresponse will always be an Action object, that details the current\
        \ \nstatus of the action and provides an interface to poll for completion.\n\
        \nIf the action completes within a specified timeout, we will return\nan HTTP\
        \ status code of `200` and the return value will include any\noutput from\
        \ the action.  If it does not complete, we will return a\n`201` response code,\
        \ and the action's endpoint may be polled to follow\nits progress."
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/autofocusInput'
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                allOf:
                - &id003
                  $ref: '#/components/schemas/Action'
                - &id004
                  properties:
                    input:
                      $ref: '#/components/schemas/autofocusInput'
                    output: {}
                  type: object
          description: Action completed immediately
        '201':
          content:
            application/json:
              schema:
                allOf:
                - *id003
                - *id004
          description: Action started
      summary: Perform a simple autofocus routine.
      tags:
      - actions
    get:
      description: 'List running and completed `autofocus` actions.


        This `GET` request will return a list of `Action` objects corresponding

        to the `autofocus` action.  It will include all the times it has

        been run since the server was last restarted, including running, completed,

        and failed attempts.'
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                items:
                  allOf:
                  - *id003
                  - *id004
                type: array
          description: Action queue
      summary: List running and completed `autofocus` actions.
      tags:
      - actions
  /api/v2/extensions/org.openflexure.autofocus/fast_autofocus:
    post:
      description: "Perform a fast down-up-down-up autofocus\n\nThis \"fast\" autofocus\
        \ method moves the stage continuously in Z, while\nfollowing the sharpness\
        \ using the MJPEG stream.  This version is the\nsimplest \"fast\" autofocus\
        \ method, and performs the following sequence \nof moves:\n\n1. Move to `-dz/2`,\
        \ i.e. the bottom of the range\n2. Move up by `dz`, i.e. to the top of the\
        \ range, while recording the\n   sharpness of the image as a function of time.\
        \  Record the estimated\n   position of the stage when the sharpness was maximised,\
        \ `fz`.\n3. Move back to the bottom (by `-dz`)\n4. Move up to the position\
        \ where it was sharpest.\n\n## Backlash correction\nThis routine should cancel\
        \ out backlash: the stage is moving upwards as\nwe record the sharpnes vs\
        \ z data, and it is also moving upwards when\nwe make the final move to the\
        \ sharpest point.  Mechanical backlash should\ntherefore be the same in both\
        \ cases.\n\nThis does not account for lag between the sharpness measurements\
        \ and the\nstage's motion; that has been tested for and seems not to be a\
        \ big issue\nmost of the time, but may need to be accounted for in the future,\
        \ if\nhardware or software changes increase the latency.\n\n## Sharpness metric\n\
        This method uses the MJPEG preview stream to estimate the sharpness of\nthe\
        \ image.  MJPEG streams consist of a series of independent JPEG images,\n\
        so each frame can be looked at in isolation (though see later for an \nimportant\
        \ caveat).  JPEG images are compressed lossily, by taking the \ndiscrete cosine\
        \ transform (DCT) of each 8x8 block in the image.  A very\nrough precis of\
        \ how this works is that after the DCT, cosine components \nthat are deemed\
        \ unimportant (i.e. smaller than a threshold) are discarded.\nThe effect is\
        \ that images with lots of high-frequency information have a\nlarger file\
        \ size.\n\nWe look only at the size of each JPEG frame in the stream, so we\
        \ get a\nremarkably robust estimate of image sharpness without even opening\
        \ the \nimages!  That's what lets us analyse 30 images/second even on the\
        \ very\nlimited processing power available to the Raspberry Pi 3.\n\n## Warning:\
        \ frame independence\nWe assume that JPEG frames are independent.  This is\
        \ only true if the\nMJPEG stream is encoded at *constant quality* without\
        \ any additional\nbit rate control.  By default, many streams will reduce\
        \ the quality\nfactor if they exceed a target bit rate, which badly affects\
        \ this\nmethod.  We turn off bit rate limiting for the Raspberry Pi camera,\n\
        which fixes the problem, at the expense of sometimes failing if\nparticularly\
        \ sharp images appear in the stream, as there is a fairly\nsmall maximum size\
        \ for each JPEG frame beyond which empty images are \nreturned.\n\n## Estimation\
        \ of sharpness vs z\nWhat we record during an autofocus is two time series,\
        \ from two parallel\nthreads.  One thread monitors the camera, and records\
        \ the size of each\nJPEG frame as a function of time.  NB this is time from\
        \ `time.time()`\nin Python, so will not be microsecond-accurate.  The other\
        \ thread is\nresponsible for moving the stage, and records its current Z position\
        \ \nbefore and after each move.  Interpolating between these `(t, z)` points\n\
        gives us a `z` value for each JPEG size, and so we can estimate the \nJPEG\
        \ size as a function of `z` and hence determine the `z` value at \nwhich sharpness\
        \ is maximised.\n\nThis `POST` request starts an Action, i.e. the hardware\
        \ will do something\nthat may continue after the HTTP request has been responded\
        \ to.  The \nresponse will always be an Action object, that details the current\
        \ \nstatus of the action and provides an interface to poll for completion.\n\
        \nIf the action completes within a specified timeout, we will return\nan HTTP\
        \ status code of `200` and the return value will include any\noutput from\
        \ the action.  If it does not complete, we will return a\n`201` response code,\
        \ and the action's endpoint may be polled to follow\nits progress."
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fast_autofocusInput'
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                allOf:
                - &id005
                  $ref: '#/components/schemas/Action'
                - &id006
                  properties:
                    input:
                      $ref: '#/components/schemas/fast_autofocusInput'
                    output: {}
                  type: object
          description: Action completed immediately
        '201':
          content:
            application/json:
              schema:
                allOf:
                - *id005
                - *id006
          description: Action started
      summary: Perform a fast down-up-down-up autofocus
      tags:
      - actions
    get:
      description: 'List running and completed `fast_autofocus` actions.


        This `GET` request will return a list of `Action` objects corresponding

        to the `fast_autofocus` action.  It will include all the times it has

        been run since the server was last restarted, including running, completed,

        and failed attempts.'
      parameters: []
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                items:
                  allOf:
                  - *id005
                  - *id006
                type: array
          description: Action queue
      summary: List running and completed `fast_autofocus` actions.
      tags:
      - actions
  /api/v2/extensions/org.openflexure.autofocus/fast_up_down_up_autofocus:
    post:
      description: "Perform a fast up-down-up autofocus, with feedback\n\nAutofocus\
        \ by measuring on the way down, and moving back up with feedback.\nThis is\
        \ a \"fast\" autofocus method, i.e. it moves the stage continuously\nwhile\
        \ monitoring the sharpness using the MJPEG stream. See `fast_autofocus`\n\
        for more details.\n\nThis autofocus method is very efficient, as it only passes\
        \ the peak once.\nThe sequence of moves it performs is:\n\n1.  Move to the\
        \ top of the range `dz/2` (can be disabled)\n\n2.  Move down by `dz` while\
        \ monitoring JPEG size to find the focus.\n\n3.  Move back up to the `target_z`\
        \ position, relative to the sharpest image.\n\n4.  Measure the sharpness,\
        \ and compare against the curve recorded in (2) to \\\n    estimate how much\
        \ further we need to go.  Make this move, to reach our \\\n    target position.\n\
        \nMoving back to the target position in two steps allows us to correct for\n\
        backlash, by using the sharpness-vs-z curve as a rough encoder for Z. The\n\
        main source of error is that the curves on the way up and the way down are\
        \ \nnot always identical, largely due to small lateral shifts as the Z axis\
        \ is\nmoved.\n\nParameters:\n  * `dz`: number of steps over which to scan\
        \ (optional, default 2000)\n\n  * `target_z`: we aim to finish at this position,\
        \ relative to focus.  This may \n    be useful if, for example, you want to\
        \ acquire a stack of images in Z. \n    It is optional, and the default value\
        \ of 0 will finish at the focus.\n\n  * `initial_move_up`: (optional, default\
        \ True) set this to `False` to move down\n    from the starting position.\
        \  Mostly useful if you're able to combine\n    the initial move with something\
        \ else, e.g. moving to the next scan point.\n\n  * **backlash**: (optional,\
        \ default 25) is a small extra move made in step\n    3 to help counteract\
        \ backlash.  It should be small enough that you\n    would always expect there\
        \ to be greater backlash than this.  Too small\n    might slightly hurt accuracy,\
        \ but is unlikely to be a big issue.  Too big\n    may cause you to overshoot,\
        \ which is a problem.\n\n  * **mini_backlash**: (optional, default 25) is\
        \ an alias for `backlash` and will be\n    removed in due course.\n\nThis\
        \ `POST` request starts an Action, i.e. the hardware will do something\nthat\
        \ may continue after the HTTP request has been responded to.  The \nresponse\
        \ will always be an Action object, that details the current \nstatus of the\
        \ action and provides an interface to poll for completion.\n\nIf the action\
        \ completes within a specified timeout, we will return\nan HTTP status code\
        \ of `200` and the return value will include any\noutput from the action.\
        \  If it does not complete, we will return a\n`201` response code, and the\
        \ action's endpoint may be polled to follow\nits progress."
      parameters: []
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/fast_up_down_up_autofocusInput'
      responses:
        5XX:
          content:
            application/json:
              schema:
                properties:
                  code:
                    format: integer
                    type: number
                  message:
                    type: string
                  name:
                    type: string
                type: object
          description: Unexpected error
        '200':
          content:
            application/json:
              schema:
                allOf:
                - &id007
                  $ref: '#/components/schemas/Action'
                - &id008
                  properties:
                    input:
                      $ref: '#/components/schemas/fast_up_down_up_autofocusInput'
                    output: {}
                  type: object
          description: Action completed immediately
        '201':
          content:
            application/json:
              schema:
                allOf:
                - *id007
                - *id008
          description: Action started
      summary: Perform a fast up-down-up autofocus, with feedback
      tags:
      - actions
    get:
      description: 'List running and completed `fast_up_down_up_autofocus` actions.


        This `GET` request will return a list of `Action` objects corresponding

        to the `fast_up_down_up_autofocus` action.  It will include all the times
